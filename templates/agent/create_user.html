{% extends 'base.html' %}
{% block title %}创建用户{% endblock %}
{% block content %}
<div class="col-md-5 mx-auto">
    <div class="card">
        <div class="card-header"><i class="bi bi-person-plus"></i> 创建{% if role == 'agent' %}代理{% else %}会员{% endif %}</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="role" value="{{ role }}">
                <div class="mb-3"><label class="form-label">用户名 *</label><input name="username" class="form-control" required autofocus></div>
                <div class="mb-3"><label class="form-label">密码 *</label><input name="password" type="password" class="form-control" required></div>
                <div class="mb-3"><label class="form-label">推荐码 (可选)</label><input name="parent_code" class="form-control" placeholder="填写推荐人的推广码"></div>
                <button type="submit" class="btn btn-primary w-100">创建</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
