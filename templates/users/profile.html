{% extends 'base.html' %}
{% block title %}个人设置{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><i class="bi bi-gear"></i> 个人设置</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input class="form-control" value="{{ user.username }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <input class="form-control" value="{{ user.get_role_display }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">余额</label>
                        <input class="form-control" value="¥{{ user.balance }}" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" name="email" class="form-control" value="{{ user.email }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">手机号</label>
                        <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">新密码（留空不修改）</label>
                        <input type="password" name="password" class="form-control" placeholder="至少6位">
                    </div>
                    <button type="submit" class="btn btn-primary">保存修改</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
